<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Approvals</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f5f5f5; text-align: left; }
  </style>
</head>
<body>
  <p><a href="/">← Back to Invoices</a></p>
  <h2>Pending Approvals</h2>
  <table>
    <tr><th>Task ID</th><th>Invoice ID</th><th>Decision</th></tr>
    {% for r in rows %}
      <tr>
        <td>{{ r.id }}</td>
        <td><a href="/invoices/{{ r.invoice_id }}">{{ r.invoice_id }}</a></td>
        <td>
          <form method="post" action="/approvals/{{ r.id }}/decide">
            <input type="text" name="approver" placeholder="approver"/>
            <input type="text" name="note" placeholder="note"/>
            <select name="decision">
              <option value="APPROVED">APPROVE</option>
              <option value="REJECTED">REJECT</option>
            </select>
            <button type="submit">Submit</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </table>
</body>
</html>
